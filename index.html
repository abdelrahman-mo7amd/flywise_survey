<!DOCTYPE html>

<head>

<!-- NAV                                                            -->

      <a href="#survey" data-goto="survey" class="btn btn-primary hidden sm:inline-flex text-sm" data-i18n="nav.cta"></a>
      <a href="#coming-soon" data-goto="coming-soon" class="btn btn-primary hidden sm:inline-flex text-sm hidden" data-auth-only data-i18n="comingSoon.explore_btn"></a>
      <button id="mobile-toggle" class="md:hidden p-2 rounded-full hover:bg-black/5" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>

  <div id="mobile-nav" class="md:hidden absolute inset-x-0 top-20 mx-4 glass rounded-xl2 p-5 flex flex-col gap-4 text-sm font-medium">

    <a href="#about" data-i18n="nav.about"></a>

<!-- ============================================================= -->
<!-- VIEW: LANDING                                                  -->
<!-- ============================================================= -->
<main id="view-landing" class="view active">

  <!-- ---------- HERO ---------- -->
  <section id="top" class="relative pt-40 pb-28 overflow-hidden">
    <div class="blob w-[420px] h-[420px] -top-24 -start-24" style="background: var(--indigo);"></div>
    <div class="blob w-[380px] h-[380px] top-40 -end-32" style="background: var(--pink);"></div>
    <div class="max-w-5xl mx-auto px-6 lg:px-10 text-center relative z-10">
      <div class="reveal">
        <div class="flex items-center justify-center gap-2 flex-wrap">
          <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-black/5 text-xs font-semibold font-eyebrow tracking-wide text-[--ink-700]" data-i18n="hero.eyebrow"></span>
        </div>
        <h1 class="mt-6 text-4xl sm:text-5xl lg:text-6xl leading-[1.15] font-extrabold max-w-4xl mx-auto">
          <span data-i18n="hero.title"></span>
        </h1>
        <p class="mt-7 text-lg text-[--ink-500] max-w-2xl mx-auto leading-relaxed" data-i18n="hero.subtitle"></p>
        <div class="mt-9 flex flex-wrap items-center justify-center gap-4">
          <a href="#survey" data-goto="survey" class="btn btn-primary" data-i18n="hero.cta_survey"></a>
          <a href="#signup" data-goto="signup" class="btn btn-secondary hidden sm:inline-flex" data-guest-only data-i18n="hero.cta_primary"></a>
          <a href="#coming-soon" data-goto="coming-soon" class="btn btn-primary hidden" data-auth-only data-i18n="comingSoon.explore_btn"></a>
        </div>
      </div>

      <!-- Signature: animated flight-route visualization -->
      <div class="reveal reveal-delay-2 mt-16 route-wrap max-w-3xl mx-auto">
        <svg viewBox="0 0 700 220" class="w-full h-auto" aria-hidden="true">
          <path id="flightPath" d="M60,170 C 200,20 500,20 640,170" fill="none" stroke="url(#routeGrad)" stroke-width="2.5" class="route-path" stroke-linecap="round"/>
          <circle cx="60" cy="170" r="7" fill="#5E2BFF" class="route-dot origin"/>
          <circle cx="640" cy="170" r="7" fill="#FC6DAB" class="route-dot dest"/>
          <g>
            <path d="M-9,-4 L9,0 L-9,4 L-5,0 Z" fill="#5E2BFF"/>
            <animateMotion dur="5.5s" repeatCount="indefinite" rotate="auto" path="M60,170 C 200,20 500,20 640,170"/>
          </g>
          <defs>
            <linearGradient id="routeGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#5E2BFF"/>
              <stop offset="0.55" stop-color="#C04CFD"/>
              <stop offset="1" stop-color="#FC6DAB"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="flex items-center justify-center gap-3 mt-2 text-xs text-[--ink-500] font-medium">
          <span data-i18n="hero.badge1"></span>
          <span class="w-1 h-1 rounded-full bg-[--ink-300]"></span>
          <span data-i18n="hero.badge2"></span>
        </div>
      </div>
    </div>
  </section>

  <!-- ---------- SURVEY INTRO ---------- -->

        <h2 class="mt-5 text-3xl sm:text-4xl font-extrabold leading-tight" data-i18n="surveyIntro.title"></h2>
        <p class="mt-5 text-[--ink-500] leading-relaxed" data-i18n="surveyIntro.intro"></p>

        <ul class="mt-7 grid sm:grid-cols-2 gap-4 text-sm">
          <li class="flex items-start gap-2.5">
            <svg class="mt-0.5 shrink-0" width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="var(--indigo)"/><path d="M6 10.2l2.6 2.6L14.5 7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="text-[--ink-700]" data-i18n="surveyIntro.point1"></span>
          </li>
          <li class="flex items-start gap-2.5">
            <svg class="mt-0.5 shrink-0" width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="var(--indigo)"/><path d="M6 10.2l2.6 2.6L14.5 7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="text-[--ink-700]" data-i18n="surveyIntro.point2"></span>
          </li>
          <li class="flex items-start gap-2.5">
            <svg class="mt-0.5 shrink-0" width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="var(--indigo)"/><path d="M6 10.2l2.6 2.6L14.5 7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="text-[--ink-700]" data-i18n="surveyIntro.point3"></span>
          </li>
          <li class="flex items-start gap-2.5">
            <svg class="mt-0.5 shrink-0" width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="10" fill="var(--indigo)"/><path d="M6 10.2l2.6 2.6L14.5 7" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="text-[--ink-700]" data-i18n="surveyIntro.point4"></span>
          </li>
        </ul>

        <div class="mt-9 flex flex-wrap items-center gap-4">
          <a href="#survey" data-goto="survey" id="start-survey-btn" class="btn btn-primary text-base px-9 py-4" data-i18n="surveyIntro.cta"></a>
        </div>
        <p class="mt-5 text-xs text-[--ink-300] max-w-md" data-i18n="surveyIntro.disclaimer"></p>
      </div>

      <div class="reveal reveal-delay-2">
        <div class="card glass rounded-xl3 p-6 sm:p-7 mx-auto max-w-md">
          <div class="flex items-center justify-between mb-4">
            <span class="text-xs font-semibold text-[--ink-500]" data-i18n="survey.title"></span>
            <span class="text-xs font-semibold text-[--ink-500]" data-i18n="surveyIntro.preview_badge"></span>
          </div>
          <div class="h-1.5 rounded-full bg-[--ink-100] overflow-hidden mb-6">
            <div class="h-full rounded-full" style="width: 30%; background: var(--gradient-brand);"></div>
          </div>
          <div class="text-xs font-bold tracking-widest uppercase text-violet mb-2" data-i18n="survey.sections.s2"></div>
          <div class="font-bold text-lg mb-5" data-i18n="survey.q3.title"></div>
          <div class="grid gap-2.5">
            <div class="option-card flex items-center gap-3 px-4 py-3"><span class="option-dot"></span><span class="font-medium text-sm" data-i18n="survey.q3.options.1"></span></div>
            <div class="option-card selected flex items-center gap-3 px-4 py-3"><span class="option-dot"></span><span class="font-medium text-sm" data-i18n="survey.q3.options.2"></span></div>
            <div class="option-card flex items-center gap-3 px-4 py-3"><span class="option-dot"></span><span class="font-medium text-sm" data-i18n="survey.q3.options.3"></span></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ---------- ABOUT ---------- -->
  <section id="about" class="py-24 border-y border-black/5 bg-[--surface]">
    <div class="max-w-5xl mx-auto px-6 lg:px-10">

        </div>
        <div class="card glass p-8 reveal reveal-delay-2">
          <p class="text-[--ink-700] leading-relaxed" data-i18n="about.p2"></p>
        </div>
        <div class="card glass p-8 reveal reveal-delay-3">
          <p class="text-[--ink-700] leading-relaxed" data-i18n="about.p3"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ---------- MISSION & VISION ---------- -->
  <section id="mission" class="py-24">
    <div class="max-w-5xl mx-auto px-6 lg:px-10">
      <div class="reveal text-center">
        <span class="text-xs font-bold font-eyebrow tracking-widest uppercase text-[--indigo]" data-i18n="mission.eyebrow"></span>
      </div>
      <div class="mt-10 grid sm:grid-cols-2 gap-6">
        <div class="card p-10 reveal reveal-delay-1 rounded-xl3" style="background: var(--gradient-brand); color: white;">

          <p class="mt-4 text-xl sm:text-2xl font-display font-semibold leading-snug" data-i18n="mission.mission_text"></p>
        </div>
        <div class="card p-10 reveal reveal-delay-2 rounded-xl3" style="background: var(--gradient-warm);">
          <span class="text-xs font-bold font-eyebrow tracking-widest uppercase text-[--ink-700]" data-i18n="mission.vision_label"></span>
          <p class="mt-4 text-xl sm:text-2xl font-display font-semibold leading-snug text-[--ink-900]" data-i18n="mission.vision_text"></p>

  <!-- ---------- WHY FLYWISE ---------- -->
  <section id="why" class="py-28" style="background: var(--gradient-soft);">
    <div class="max-w-6xl mx-auto px-6 lg:px-10">

        </div>

          <div class="icon-badge">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--indigo)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v5.2c0 .5-.15 1-.44 1.4L5.9 15.5c-1 1.5.06 3.5 1.85 3.5h8.5c1.79 0 2.85-2 1.85-3.5l-3.66-5.9A2.5 2.5 0 0114 8.2V3M8.5 14h7"/></svg>
          </div>
          <h3 class="mt-5 font-bold text-lg" data-i18n="why.card2_title"></h3>
          <p class="mt-2 text-sm text-[--ink-500] leading-relaxed" data-i18n="why.card2_desc"></p>
        </div>
        <div class="card glass p-8 reveal reveal-delay-3">
          <div class="icon-badge">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--indigo)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/></svg>

        </div>
      </div>
    </div>

        <h2 class="mt-3 text-4xl sm:text-5xl font-extrabold leading-tight" data-i18n="future.title"></h2>
        <p class="mt-5 text-[--ink-500] text-lg leading-relaxed" data-i18n="future.subtitle"></p>
      </div>

      <div class="mt-14 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="locked-card card glass reveal reveal-delay-1 p-8 h-44 flex items-end">

          <span class="locked-badge">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M6 10V8a6 6 0 0112 0v2h1a1 1 0 011 1v9a1 1 0 01-1 1H5a1 1 0 01-1-1v-9a1 1 0 011-1h1zm2 0h8V8a4 4 0 00-8 0v2z"/></svg>

            <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M6 10V8a6 6 0 0112 0v2h1a1 1 0 011 1v9a1 1 0 01-1 1H5a1 1 0 01-1-1v-9a1 1 0 011-1h1zm2 0h8V8a4 4 0 00-8 0v2z"/></svg>
